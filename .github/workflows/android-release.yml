name: Android Multi-App Build & Release

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build Type'
        type: choice
        options:
          - debug
          - release
        default: debug
        required: true

jobs:
  build-and-release:
    name: Build and Release Apps
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: ${{ github.event.inputs.build-type || 'release' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle with Caching
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-disabled: false

      # ========== 删除了原来的Decode Keystore签名解码步骤 ==========

      - name: Build APKs with Caching
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --build-cache
          else
            ./gradlew assembleDebug --build-cache
          fi
        # ========== 删除了所有签名相关的环境变量 ==========

      - name: Collect APKs to flat directory
        run: |
          mkdir -p collected-apks

          # 复制所有 APK 文件
          find . -name "*.apk" -path "*/build/outputs/apk/${{ env.BUILD_TYPE }}/*" -exec cp {} collected-apks/ \;

          echo "Collected files:"
          ls -lh collected-apks/

      - name: Upload APKs to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TYPE }}-apks
          path: collected-apks/
          if-no-files-found: error
          archive: false

      - name: Cleanup
        if: always()
        run: |
          # ========== 删除了删除release.jks的逻辑 ==========
          rm -rf collected-apks || true
